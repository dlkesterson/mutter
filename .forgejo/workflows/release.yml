name: Release

on:
  push:
    tags:
      - 'v*.*.*'  # Trigger on version tags like v0.1.0, v1.2.3, etc.
  workflow_dispatch:  # Allow manual trigger from Actions UI

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Get version from tag
        id: get_version
        run: |
          if [ "${{ github.ref_type }}" = "tag" ]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION="dev-$(date +%Y%m%d)"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_ENV
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install pnpm
        run: npm install -g pnpm

      - name: Setup Rust
        uses: https://github.com/actions-rs/toolchain@v1
        with:
          toolchain: stable
          profile: minimal
          override: true

      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            libgtk-3-dev

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build

      - name: Prepare artifacts
        run: |
          mkdir -p artifacts
          VERSION=${{ env.VERSION }}

          # Find and copy AppImage
          if [ -f src-tauri/target/release/bundle/appimage/mutter_${VERSION}_amd64.AppImage ]; then
            cp src-tauri/target/release/bundle/appimage/mutter_${VERSION}_amd64.AppImage \
               artifacts/mutter-${VERSION}-linux-x86_64.AppImage
          fi

          # Find and copy .deb package
          if [ -f src-tauri/target/release/bundle/deb/mutter_${VERSION}_amd64.deb ]; then
            cp src-tauri/target/release/bundle/deb/mutter_${VERSION}_amd64.deb \
               artifacts/mutter-${VERSION}-linux-x86_64.deb
          fi

          # List artifacts
          ls -lh artifacts/

      - name: Create release and upload artifacts
        run: |
          VERSION=${{ env.VERSION }}
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          # Create release body
          cat > release_body.md << 'EOF'
          ## Mutter v${{ env.VERSION }}

          Voice-first markdown editor with local ML capabilities.

          ### Downloads
          - **Linux AppImage**: Download, make executable (`chmod +x`), and run
          - **Linux .deb**: Install with `sudo dpkg -i mutter-*.deb`

          ### First Run
          1. Open a vault folder (markdown files directory)
          2. Download a Whisper model from Settings (Distil Medium recommended)
          3. Start voice commands with the microphone button

          ### Features
          - Voice-controlled markdown editing (bold, italic, headings, etc.)
          - Local speech-to-text with Whisper
          - Semantic command recognition with BERT
          - Live preview editor (syntax hides when not editing)
          - Auto-save functionality

          ---
          🤖 Generated with [Forgejo Actions](https://forgejo.org)
          EOF

          # Create release using Forgejo API
          curl -X POST \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d "{
              \"tag_name\": \"${TAG_NAME}\",
              \"name\": \"Mutter ${VERSION}\",
              \"body\": $(jq -Rs . < release_body.md),
              \"draft\": false,
              \"prerelease\": false
            }" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases"

      - name: Upload artifacts to release
        run: |
          VERSION=${{ env.VERSION }}
          TAG_NAME="${GITHUB_REF#refs/tags/}"

          # Get release ID
          RELEASE_ID=$(curl -s \
            -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
            "${{ github.api_url }}/repos/${{ github.repository }}/releases/tags/${TAG_NAME}" \
            | jq -r '.id')

          echo "Release ID: $RELEASE_ID"

          # Upload AppImage if it exists
          if [ -f artifacts/mutter-${VERSION}-linux-x86_64.AppImage ]; then
            curl -X POST \
              -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
              -H "Content-Type: application/vnd.appimage" \
              --data-binary @artifacts/mutter-${VERSION}-linux-x86_64.AppImage \
              "${{ github.api_url }}/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=mutter-${VERSION}-linux-x86_64.AppImage"
          fi

          # Upload .deb if it exists
          if [ -f artifacts/mutter-${VERSION}-linux-x86_64.deb ]; then
            curl -X POST \
              -H "Authorization: token ${{ secrets.FORGEJO_TOKEN }}" \
              -H "Content-Type: application/vnd.debian.binary-package" \
              --data-binary @artifacts/mutter-${VERSION}-linux-x86_64.deb \
              "${{ github.api_url }}/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=mutter-${VERSION}-linux-x86_64.deb"
          fi
