<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mutter WASM Embeddings Test (WebGPU Alternative)</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      max-width: 1200px;
      margin: 0 auto;
      padding: 20px;
      background: #1a1a1a;
      color: #e0e0e0;
    }
    h1 {
      color: #2196F3;
      border-bottom: 2px solid #2196F3;
      padding-bottom: 10px;
    }
    .warning {
      background: #f57c00;
      padding: 15px;
      border-radius: 8px;
      margin: 20px 0;
    }
    #output {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px;
      font-family: 'Courier New', monospace;
      font-size: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      max-height: 600px;
      overflow-y: auto;
    }
    .status {
      padding: 10px;
      margin: 10px 0;
      border-radius: 4px;
      font-weight: bold;
    }
    .status.success { background: #2e7d32; }
    .status.error { background: #c62828; }
    .status.info { background: #1976d2; }
    button {
      background: #2196F3;
      color: white;
      border: none;
      padding: 12px 24px;
      font-size: 16px;
      border-radius: 4px;
      cursor: pointer;
      margin: 10px 5px;
    }
    button:hover {
      background: #1976d2;
    }
    button:disabled {
      background: #666;
      cursor: not-allowed;
    }
  </style>
</head>
<body>
  <h1>🧪 Mutter WASM Embeddings Prototype</h1>

  <div class="warning">
    ⚠️ <strong>WebGPU Not Available</strong><br>
    Testing with WASM fallback (CPU-based). This may still be faster than current Candle implementation!
  </div>

  <div id="status" class="status info">
    Ready to test WASM embeddings
  </div>

  <div>
    <button onclick="runTest()">Run WASM Test</button>
    <button onclick="runExtensiveTest()">Run Extensive Test (20 commands)</button>
    <button onclick="clearOutput()">Clear Output</button>
  </div>

  <div id="output"></div>

  <script type="module">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.17.2';

    // Configuration - Force WASM backend
    env.allowLocalModels = false;
    env.allowRemoteModels = true;
    env.backends.onnx.wasm.numThreads = navigator.hardwareConcurrency || 4;

    const output = document.getElementById('output');
    const statusDiv = document.getElementById('status');

    function log(message) {
      const timestamp = new Date().toLocaleTimeString();
      const line = `[${timestamp}] ${message}\n`;
      output.textContent += line;
      output.scrollTop = output.scrollHeight;
      console.log(message);
    }

    function setStatus(message, type = 'info') {
      statusDiv.textContent = message;
      statusDiv.className = `status ${type}`;
    }

    async function runEmbedding(text) {
      log(`   Input: "${text}"`);

      const embedStart = performance.now();

      const embedding = await window.embedder(text, {
        pooling: 'mean',
        normalize: true
      });

      const embedTime = performance.now() - embedStart;
      const firstValues = Array.from(embedding.data.slice(0, 5));

      log(`   ✓ Generated in ${embedTime.toFixed(2)}ms`);

      return {
        text,
        time: embedTime,
        dimensions: embedding.dims,
        firstValues
      };
    }

    window.runTest = async function() {
      output.textContent = '';
      log('='.repeat(80));
      log('Mutter WASM Embeddings Test (WebGPU Alternative)');
      log('Testing Transformers.js with WASM backend');
      log('='.repeat(80));

      // Load model once
      if (!window.embedder) {
        setStatus('Loading model...', 'info');
        log('\n📦 Loading model (first time)...');
        log(`   CPU threads: ${env.backends.onnx.wasm.numThreads}`);

        const loadStart = performance.now();

        window.embedder = await pipeline(
          'feature-extraction',
          'Xenova/all-MiniLM-L6-v2',
          {
            device: 'wasm',
            progress_callback: (progress) => {
              if (progress.status === 'progress') {
                const pct = Math.round(progress.progress);
                log(`   Download: ${progress.file} - ${pct}%`);
              }
            }
          }
        );

        const loadTime = performance.now() - loadStart;
        log(`   ✓ Model loaded in ${loadTime.toFixed(2)}ms`);
      }

      // Test with Mutter commands
      const testCommands = [
        'make this bold',
        'heading one',
        'create task',
        'search for authentication',
        'undo that'
      ];

      log('\n📝 Testing with real Mutter commands:');
      setStatus('Running tests...', 'info');

      const results = [];
      for (const command of testCommands) {
        const result = await runEmbedding(command);
        results.push(result);
      }

      // Calculate statistics
      const times = results.map(r => r.time);
      const avgTime = times.reduce((a, b) => a + b, 0) / times.length;
      const minTime = Math.min(...times);
      const maxTime = Math.max(...times);

      log('\n📊 Performance Statistics:');
      log(`   Average: ${avgTime.toFixed(2)}ms`);
      log(`   Min: ${minTime.toFixed(2)}ms`);
      log(`   Max: ${maxTime.toFixed(2)}ms`);

      // Comparison with expected Candle performance
      const expectedCandleTime = 75; // Estimated from typical Rust BERT
      const speedup = expectedCandleTime / avgTime;

      log('\n📈 Comparison vs Candle (estimated):');
      log(`   WASM (Transformers.js): ${avgTime.toFixed(2)}ms`);
      log(`   Candle (Rust):          ~${expectedCandleTime}ms (estimated)`);

      if (speedup > 1.5) {
        log(`   ✅ WASM is ${speedup.toFixed(2)}x FASTER!`);
        setStatus(`✅ ${speedup.toFixed(2)}x faster than Candle! Avg: ${avgTime.toFixed(2)}ms`, 'success');
      } else if (speedup > 0.7) {
        log(`   ⚡ WASM is competitive: ${speedup.toFixed(2)}x`);
        setStatus(`⚡ Competitive performance: ${avgTime.toFixed(2)}ms`, 'info');
      } else {
        log(`   ⚠️  WASM is slower: ${speedup.toFixed(2)}x`);
        setStatus(`⚠️ Slower than Candle: ${avgTime.toFixed(2)}ms`, 'error');
      }

      log('\n💡 Recommendations:');
      if (speedup > 1.2) {
        log('   → Migration recommended: WASM provides better performance');
        log('   → Easier maintenance: No Rust compilation needed');
        log('   → Benefit: Simpler deployment, consistent cross-platform');
      } else {
        log('   → Keep Candle: Current implementation is competitive');
        log('   → Consider WebGPU when NVIDIA drivers are working');
      }
    };

    window.runExtensiveTest = async function() {
      output.textContent = '';
      log('='.repeat(80));
      log('Extensive WASM Embeddings Test (20+ Commands)');
      log('='.repeat(80));

      // Load model
      if (!window.embedder) {
        setStatus('Loading model...', 'info');
        log('\n📦 Loading model...');

        window.embedder = await pipeline(
          'feature-extraction',
          'Xenova/all-MiniLM-L6-v2',
          { device: 'wasm' }
        );

        log('   ✓ Model loaded');
      }

      // Full Mutter command registry
      const allCommands = [
        // Formatting
        'make this bold',
        'make this italic',
        'make this a heading',
        'heading one',
        'heading two',
        'make this a list',
        'bullet list',
        'quote this',
        'make this a quote',
        // Editor actions
        'undo',
        'redo',
        'undo that',
        'delete',
        'select all',
        // System commands
        'create task',
        'add task',
        'new task',
        'search for',
        'find note',
        'open note'
      ];

      log(`\n📝 Testing ${allCommands.length} commands:`);
      setStatus('Running extensive test...', 'info');

      const results = [];
      for (const command of allCommands) {
        const result = await runEmbedding(command);
        results.push(result);
      }

      const times = results.map(r => r.time);
      const avgTime = times.reduce((a, b) => a + b, 0) / times.length;
      const minTime = Math.min(...times);
      const maxTime = Math.max(...times);
      const p50 = times.sort((a, b) => a - b)[Math.floor(times.length / 2)];
      const p95 = times.sort((a, b) => a - b)[Math.floor(times.length * 0.95)];

      log('\n📊 Detailed Statistics:');
      log(`   Commands tested: ${allCommands.length}`);
      log(`   Average: ${avgTime.toFixed(2)}ms`);
      log(`   Median (p50): ${p50.toFixed(2)}ms`);
      log(`   p95: ${p95.toFixed(2)}ms`);
      log(`   Min: ${minTime.toFixed(2)}ms`);
      log(`   Max: ${maxTime.toFixed(2)}ms`);

      setStatus(`✅ Extensive test complete! Avg: ${avgTime.toFixed(2)}ms`, 'success');
    };

    window.clearOutput = function() {
      output.textContent = '';
      setStatus('Ready to test', 'info');
    };

    // Show system info on load
    log(`System: ${navigator.userAgent}`);
    log(`CPU cores: ${navigator.hardwareConcurrency || 'Unknown'}`);
    log(`WebGPU available: ${!!navigator.gpu ? 'Yes (but no adapter)' : 'No'}`);
    log(`Backend: WASM (CPU-based)`);
    log('');
  </script>
</body>
</html>
